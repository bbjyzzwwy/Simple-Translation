<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007ACC"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Left speech bubble (A) -->
  <g transform="translate(28, 28)">
    <rect x="0" y="0" width="28" height="22" rx="5" fill="rgba(255,255,255,0.95)"/>
    <polygon points="4,22 8,28 12,22" fill="rgba(255,255,255,0.95)"/>
    <text x="14" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#007ACC">A</text>
  </g>
  <!-- Right speech bubble (文) -->
  <g transform="translate(72, 28)">
    <rect x="0" y="0" width="28" height="22" rx="5" fill="rgba(255,255,255,0.95)"/>
    <polygon points="24,22 20,28 16,22" fill="rgba(255,255,255,0.95)"/>
    <text x="14" y="15" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#007ACC">文</text>
  </g>
  <!-- Translation arrows -->
  <g transform="translate(64, 52)" stroke="rgba(255,255,255,0.9)" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="-16" y1="0" x2="16" y2="0"/>
    <polyline points="-16,0 -10,-5"/>
    <polyline points="-16,0 -10,5"/>
    <polyline points="16,0 10,-5"/>
    <polyline points="16,0 10,5"/>
  </g>
  <!-- Speaker icon at bottom -->
  <g transform="translate(64, 82)" fill="rgba(255,255,255,0.85)">
    <polygon points="-10,-6 -4,-6 3,-12 3,12 -4,6 -10,6"/>
    <path d="M6,-4 Q10,-1 10,0 Q10,1 6,4" stroke="rgba(255,255,255,0.85)" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>
